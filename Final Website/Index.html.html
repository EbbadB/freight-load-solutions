  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng:.08em;text-transform:uppercase;color:rgba(21,21,21,.5)\">Company<\u002Fspan><input ref=\"{{ setCompany }}\" type=\"text\" style=\"background:#FFFFFF;border:1px solid rgba(21,21,21,.14);border-radius:8px;padding:13px 14px;color:#1D2128;font-family:inherit;font-size:15px;transition:border-color .2s\" style-focus=\"border-color:#FF9E20\"><\u002Flabel>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px\">\n            <label style=\"display:flex;flex-direction:column;gap:7px\"><span style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(21,21,21,.5)\">Email Address<\u002Fspan><input ref=\"{{ setEmail }}\" type=\"email\" required=\"\" style=\"background:#FFFFFF;border:1px solid rgba(21,21,21,.14);border-radius:8px;padding:13px 14px;color:#1D2128;font-family:inherit;font-size:15px;transition:border-color .2s\" style-focus=\"border-color:#FF9E20\"><\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:7px\"><span style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(21,21,21,.5)\">Phone Number<\u002Fspan><input ref=\"{{ setPhone }}\" type=\"tel\" style=\"background:#FFFFFF;border:1px solid rgba(21,21,21,.14);border-radius:8px;padding:13px 14px;color:#1D2128;font-family:inherit;font-size:15px;transition:border-color .2s\" style-focus=\"border-color:#FF9E20\"><\u002Flabel>\n          <\u002Fdiv>\n          <label style=\"display:flex;flex-direction:column;gap:7px;margin-top:14px\"><span style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(21,21,21,.5)\">What Do You Need?<\u002Fspan><textarea ref=\"{{ setNotes }}\" rows=\"3\" placeholder=\"Tell us about your freight\" style=\"background:#FFFFFF;border:1px solid rgba(21,21,21,.14);border-radius:8px;padding:13px 14px;color:#1D2128;font-family:inherit;font-size:15px;resize:vertical;transition:border-color .2s\" style-focus=\"border-color:#FF9E20\"><\u002Ftextarea><\u002Flabel>\n          <button sc-camel-on-click=\"{{ submitCallback }}\" disabled=\"{{ submitting }}\" style=\"width:100%;margin-top:22px;font-family:'Inter',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:15px;border:none;border-radius:8px;background:#1D2128;color:#F4F2F2;cursor:pointer;transition:transform .25s,box-shadow .25s;opacity:{{ submitOpacity }}\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 34px rgba(29,33,40,.25)\">{{ submitLabel }}<\u002Fbutton>\n          <sc-if value=\"{{ errorMsg }}\"><p style=\"margin:12px 0 0;font-size:13px;line-height:1.5;color:#B3261E\">{{ errorMsg }}<\u002Fp><\u002Fsc-if>\n          <p style=\"margin:14px 0 0;font-size:12px;line-height:1.5;color:rgba(21,21,21,.46)\">We respond within 2 hours during business hours. For urgent loads, call us directly.<\u002Fp>\n        <\u002Fdiv>\n        <div data-thank-you=\"\" style=\"display:none;flex-direction:column;align-items:flex-start;gap:14px;padding:20px 0\">\n          <div style=\"width:48px;height:48px;border-radius:50%;background:#FF9E20;color:#1D2128;display:flex;align-items:center;justify-content:center;font-size:22px\">✓<\u002Fdiv>\n          <h3 style=\"margin:0;font-family:'Overused Grotesk',sans-serif;font-weight:400;font-size:24px;letter-spacing:-.015em\">We've Got Your Request.<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:rgba(21,21,21,.62)\">Someone from our Pittsburgh team will call you within 2 hours.<br>For urgent loads call <a href=\"tel:4122122243\" style=\"color:#215E61;border-bottom:1px solid rgba(33,94,97,.4)\">412-212-2243<\u002Fa> directly.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== MARQUEE ===================== -->\n  <section data-screen-label=\"Marquee\" style=\"background:#FF9E20;color:#1D2128;padding:clamp(40px,6vw,72px) 0;overflow:hidden\">\n    <div style=\"display:flex;width:max-content;animation:fls-marquee 30s linear infinite\">\n      <span style=\"font-family:'Overused Grotesk',sans-serif;font-weight:400;font-size:clamp(36px,7vw,110px);line-height:1;letter-spacing:-.04em;white-space:nowrap;padding-right:.4em\">Don't let your freight sit. Call us now. —&nbsp;<\u002Fspan>\n      <span aria-hidden=\"true\" style=\"font-family:'Overused Grotesk',sans-serif;font-weight:400;font-size:clamp(36px,7vw,110px);line-height:1;letter-spacing:-.04em;white-space:nowrap;padding-right:.4em\">Don't let your freight sit. Call us now. —&nbsp;<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer data-screen-label=\"Footer\" style=\"background:#14171d;color:#F4F2F2;padding:clamp(56px,8vw,96px) clamp(16px,2.2vw,34px) 36px\">\n    <div style=\"max-width:1600px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:28px;padding-bottom:clamp(40px,6vw,72px);border-bottom:1px solid rgba(237,237,237,.12)\">\n        <div>\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(237,237,237,.5);margin-bottom:14px\">Stay in the loop<\u002Fdiv>\n          <h2 style=\"margin:0;max-width:18ch;font-family:'Overused Grotesk',sans-serif;font-weight:400;font-size:clamp(26px,3vw,42px);line-height:1.02;letter-spacing:-.03em\">Don't let your freight sit. Call us now.<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;background:rgba(237,237,237,.05);border:1px solid rgba(237,237,237,.16);border-radius:100px;padding:6px 6px 6px 20px;min-width:min(360px,100%)\">\n          <input type=\"email\" placeholder=\"Enter your email\" style=\"flex:1;background:transparent;border:none;color:#F4F2F2;font-family:inherit;font-size:15px;padding:8px 0\">\n          <button style=\"font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:12px 18px;border:none;border-radius:100px;background:#FF9E20;color:#1D2128;cursor:pointer;transition:transform .25s\" style-hover=\"transform:translateX(2px)\">Subscribe →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1.2fr;gap:clamp(24px,4vw,52px);padding-bottom:clamp(40px,6vw,72px)\">\n        <div style=\"min-width:220px\">\n          <img src=\"d876ea34-8e35-4444-95d1-69e5ff1c9302\" alt=\"FLS\" style=\"height:28px;width:auto;display:block;margin-bottom:16px\">\n          <p style=\"margin:0;max-width:34ch;font-size:15px;line-height:1.6;color:rgba(237,237,237,.56)\">A licensed freight brokerage dedicated to dry van freight for the packaging and manufacturing industry.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:22px\">\n            <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <span style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(237,237,237,.48);border:1px solid rgba(237,237,237,.12);border-radius:6px;padding:6px 10px\">{{ c }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(237,237,237,.46);margin-bottom:18px\">Services<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ footServices }}\" as=\"f\" hint-placeholder-count=\"5\">\n              <a href=\"{{ f.href }}\" style=\"font-size:15px;color:rgba(237,237,237,.72);width:fit-content;background-image:linear-gradient(currentColor,currentColor);background-repeat:no-repeat;background-position:left bottom;background-size:0% 1px;transition:background-size .3s,color .25s\" style-hover=\"color:#F4F2F2;background-size:100% 1px\">{{ f.label }}<\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(237,237,237,.46);margin-bottom:18px\">Company<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ footCompany }}\" as=\"f\" hint-placeholder-count=\"6\">\n              <a href=\"{{ f.href }}\" style=\"font-size:15px;color:rgba(237,237,237,.72);width:fit-content;background-image:linear-gradient(currentColor,currentColor);background-repeat:no-repeat;background-position:left bottom;background-size:0% 1px;transition:background-size .3s,color .25s\" style-hover=\"color:#F4F2F2;background-size:100% 1px\">{{ f.label }}<\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(237,237,237,.46);margin-bottom:18px\">Contact<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:15px;color:rgba(237,237,237,.72)\">\n            <a href=\"tel:4122122243\" style=\"transition:color .25s\" style-hover=\"color:#F4F2F2\">(412) 212-2243<\u002Fa>\n            <a href=\"mailto:info@freightloadsolutions.com\" style=\"transition:color .25s\" style-hover=\"color:#F4F2F2\">info@freightloadsolutions.com<\u002Fa>\n            <div style=\"line-height:1.5\">3707 Forbes Ave<br>Pittsburgh, PA 15213<\u002Fdiv>\n            <div style=\"color:rgba(237,237,237,.46)\">Mon–Fri 8AM–6PM EST<\u002Fdiv>\n            <div style=\"color:rgba(237,237,237,.46)\">After Hours: 24/7 Available<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:16px;padding-top:26px;border-top:1px solid rgba(237,237,237,.12);font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.04em;color:rgba(237,237,237,.48)\">\n        <span>© 2026 Freight Load Solutions LLC. All rights reserved.<\u002Fspan>\n        <div style=\"display:flex;gap:22px\">\n          <a href=\"#\" style=\"transition:color .25s\" style-hover=\"color:#F4F2F2\">Privacy Policy<\u002Fa>\n          <a href=\"#\" style=\"transition:color .25s\" style-hover=\"color:#F4F2F2\">Terms &amp; Conditions<\u002Fa>\n          <a href=\"#\" style=\"transition:color .25s\" style-hover=\"color:#F4F2F2\">Cookie Policy<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  setRoot = (el) => { this.root = el; };\n\n  componentDidMount() {\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const d = parseFloat(el.getAttribute('data-reveal-delay') || '0');\n          el.style.transitionDelay = d + 'ms';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    this.io = io;\n    requestAnimationFrame(() => {\n      if (!this.root) return;\n      this.root.querySelectorAll('[data-reveal]').forEach((el) => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(28px)';\n        el.style.transition = 'opacity .85s cubic-bezier(.16,1,.3,1), transform .85s cubic-bezier(.16,1,.3,1)';\n        io.observe(el);\n      });\n    });\n  }\n\n  componentWillUnmount() { if (this.io) this.io.disconnect(); }\n\n  state = { submitting: false, error: '' };\n  role = 'Shipper';\n  setFirstName = (el) => { this.firstName = el; };\n  setLastName = (el) => { this.lastName = el; };\n  setCompany = (el) => { this.company = el; };\n  setEmail = (el) => { this.email = el; };\n  setPhone = (el) => { this.phone = el; };\n  setNotes = (el) => { this.notes = el; };\n\n  selectRole = (e) => {\n    const btn = e.currentTarget;\n    this.role = btn.getAttribute('data-role') || 'Shipper';\n    btn.parentElement.querySelectorAll('[data-role]').forEach((b) => {\n      b.style.background = 'transparent';\n      b.style.color = 'rgba(21,21,21,.66)';\n    });\n    btn.style.background = '#FF9E20';\n    btn.style.color = '#1D2128';\n  };\n\n  submitCallback = async () => {\n    const first = this.firstName && this.firstName.value.trim();\n    const last = this.lastName && this.lastName.value.trim();\n    const email = this.email && this.email.value.trim();\n    if (!first || !last || !email) {\n      this.setState({ error: 'Please fill in your name and email.' });\n      return;\n    }\n    this.setState({ submitting: true, error: '' });\n    const payload = {\n      _subject: `New Callback Request — ${this.role} — ${first} ${last}`,\n      Role: this.role,\n      'First Name': first,\n      'Last Name': last,\n      Company: (this.company && this.company.value.trim()) || '—',\n      Email: email,\n      Phone: (this.phone && this.phone.value.trim()) || '—',\n      Message: (this.notes && this.notes.value.trim()) || '—',\n      _template: 'table',\n      _captcha: 'false'\n    };\n    try {\n      const res = await fetch('https://formsubmit.co/ajax/info@freightloadsolutions.com', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },\n        body: JSON.stringify(payload)\n      });\n      if (!res.ok) throw new Error('bad status');\n      const panel = this.root.querySelector('[data-form-panel]');\n      const thanks = this.root.querySelector('[data-thank-you]');\n      if (panel) panel.style.display = 'none';\n      if (thanks) thanks.style.display = 'flex';\n      this.setState({ submitting: false });\n    } catch (err) {\n      this.setState({\n        submitting: false,\n        error: \"Something went wrong sending that. Please call us at 412-212-2243 or email info@freightloadsolutions.com directly.\"\n      });\n    }\n  };\n\n  renderVals() {\n    return {\n      setRoot: this.setRoot,\n      setFirstName: this.setFirstName,\n      setLastName: this.setLastName,\n      setCompany: this.setCompany,\n      setEmail: this.setEmail,\n      setPhone: this.setPhone,\n      setNotes: this.setNotes,\n      selectRole: this.selectRole,\n      submitCallback: this.submitCallback,\n      submitting: this.state.submitting,\n      submitOpacity: this.state.submitting ? 0.6 : 1,\n      submitLabel: this.state.submitting ? 'Sending…' : 'Request My Callback →',\n      errorMsg: this.state.error,\n\n      navLinks: [\n        { label: 'Home', href: 'Freight Load Solutions.dc.html' },\n        { label: 'Services', href: 'Services.dc.html' },\n        { label: 'About', href: 'About.dc.html' },\n        { label: 'Contact', href: 'Contact.dc.html' }\n      ],\n      chips: ['MC# 1596635', 'DOT# 4156576', 'Surety Bonded', 'Cargo Insured'],\n      footServices: [\n        { label: 'Full Truckload', href: 'Services.dc.html#dry-van' },\n        { label: 'LTL', href: 'Services.dc.html#partial-ltl' },\n        { label: 'Expedited', href: 'Services.dc.html#expedited' },\n        { label: 'Intermodal', href: 'Freight Load Solutions.dc.html#services' },\n        { label: 'Agent Services', href: 'Services.dc.html#agent-services' }\n      ],\n      footCompany: [\n        { label: 'About Us', href: 'About.dc.html' },\n        { label: 'Why FLS', href: 'Freight Load Solutions.dc.html#carriers' },\n        { label: 'Careers', href: '#' },\n        { label: 'Blog', href: 'Freight Load Solutions.dc.html#updates' },\n        { label: 'Contact', href: 'Contact.dc.html' },\n        { label: 'Consult With Us', href: 'Consult.dc.html' }\n      ]\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
